<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('Formulario Entrenador')"></head>
<body>

<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
<div class="card card-custom p-4">

<h3>Formulario Entrenador</h3>

<form th:action="@{/entrenador/guardar}" th:object="${entrenador}" method="post">

<input type="hidden" th:field="*{id}" />

<input class="form-control mb-2" placeholder="Nombre" th:field="*{nombre}">
<div class="text-danger" th:errors="*{nombre}"></div>

<input class="form-control mb-2" placeholder="Apellido" th:field="*{apellido}">
<div class="text-danger" th:errors="*{apellido}"></div>

<input class="form-control mb-2" type="number" placeholder="Edad" th:field="*{edad}">
<input class="form-control mb-3" placeholder="Nacionalidad" th:field="*{nacionalidad}">

<button class="btn btn-warning">Guardar</button>
<a href="/entrenador" class="btn btn-secondary">Volver</a>

</form>

</div>
</div>

</body>
</html>
