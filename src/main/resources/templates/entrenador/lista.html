<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('Entrenadores')"></head>
<body>

<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
<div class="card card-custom p-4">

<h2>Entrenadores</h2>

<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<a href="/entrenador/nuevo" class="btn btn-warning mb-3">+ Nuevo</a>

<input type="text" id="buscador" class="form-control mb-3" placeholder="Buscar...">

<table class="table table-dark">
<thead>
<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Edad</th>
<th>Nacionalidad</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
<tr th:each="e : ${lista}">
<td th:text="${e.nombre}"></td>
<td th:text="${e.apellido}"></td>
<td th:text="${e.edad}"></td>
<td th:text="${e.nacionalidad}"></td>
<td>
<a th:href="@{'/entrenador/editar/' + ${e.id}}" class="btn btn-warning btn-sm">Editar</a>
<a th:href="@{'/entrenador/eliminar/' + ${e.id}}" 
   onclick="return confirm('¿Eliminar?')" 
   class="btn btn-danger btn-sm">Eliminar</a>
</td>
</tr>
</tbody>
</table>

<nav>
<ul class="pagination">
<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}">
<a class="page-link" th:href="@{/entrenador(page=${i})}" th:text="${i+1}"></a>
</li>
</ul>
</nav>

</div>
</div>

<script>
document.getElementById("buscador").addEventListener("keyup", function() {
let filtro = this.value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(fila => {
fila.style.display = fila.innerText.toLowerCase().includes(filtro) ? "" : "none";
});
});
</script>

</body>
</html>
