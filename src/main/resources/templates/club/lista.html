<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head('Clubes')"></head>

<body>

<div th:replace="layout :: navbar"></div>

<div class="container mt-4">

<div class="card p-4 shadow">

<h2 class="text-center text-dark">🏆 Clubes</h2>

<a href="/club/nuevo" class="btn btn-primary mb-3">+ Nuevo</a>

<table class="table table-striped text-center">

<thead class="table-dark">
<tr>
<th>Nombre</th>
<th>Entrenador</th>
<th>Asociación</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
<tr th:each="c : ${lista}">
<td th:text="${c.nombre}"></td>
<td th:text="${c.entrenador != null ? c.entrenador.nombre : 'Sin asignar'}"></td>
<td th:text="${c.asociacion != null ? c.asociacion.nombre : 'Sin asignar'}"></td>

<td>
<a th:href="@{'/club/editar/'+${c.id}}" class="btn btn-warning btn-sm">Editar</a>
<a th:href="@{'/club/eliminar/'+${c.id}}" class="btn btn-danger btn-sm">Eliminar</a>
</td>

</tr>
</tbody>

</table>

</div>

</div>

<div th:replace="layout :: scripts"></div>

</body>
</html>
