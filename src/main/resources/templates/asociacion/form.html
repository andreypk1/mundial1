<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('Formulario Asociación')"></head>

<body>

<div th:replace="layout :: navbar"></div>

<div class="container mt-5">

    <div class="card card-custom shadow-lg p-4">

        <h3 class="text-center mb-4">🌎 Gestión de Asociación</h3>

        <form th:action="@{/asociacion/guardar}" th:object="${asociacion}" method="post">

            <input type="hidden" th:field="*{id}" />

            <!-- NOMBRE -->
            <div class="mb-3">
                <label class="form-label fw-bold">Nombre</label>
                <div class="input-group">
                    <span class="input-group-text">🏷️</span>
                    <input type="text" class="form-control" placeholder="Ej: FIFA"
                           th:field="*{nombre}" required>
                </div>
                <div class="text-danger" th:errors="*{nombre}"></div>
            </div>

            <!-- PAIS -->
            <div class="mb-3">
                <label class="form-label fw-bold">País</label>
                <div class="input-group">
                    <span class="input-group-text">🌍</span>
                    <input type="text" class="form-control" placeholder="Ej: Suiza"
                           th:field="*{pais}">
                </div>
            </div>

            <!-- PRESIDENTE -->
            <div class="mb-4">
                <label class="form-label fw-bold">Presidente</label>
                <div class="input-group">
                    <span class="input-group-text">👤</span>
                    <input type="text" class="form-control" placeholder="Nombre del presidente"
                           th:field="*{presidente}">
                </div>
            </div>

            <!-- BOTONES -->
            <div class="d-flex justify-content-between">

                <a href="/asociacion" class="btn btn-outline-light">
                    ⬅ Volver
                </a>

                <button class="btn btn-success px-4">
                    💾 Guardar
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
