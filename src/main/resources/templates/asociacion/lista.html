<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('Asociaciones')"></head>
<body>

<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
<div class="card card-custom p-4">

<h2>🌎 Asociaciones</h2>

<!-- ALERTAS -->
<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<a href="/asociacion/nuevo" class="btn btn-dark mb-3">+ Nueva Asociación</a>

<!-- BUSCADOR -->
<input type="text" id="buscador" class="form-control mb-3" placeholder="Buscar asociación...">

<table class="table table-dark table-hover text-center">

<thead>
<tr>
<th>Nombre</th>
<th>País</th>
<th>Presidente</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
<tr th:each="a : ${lista}">
<td th:text="${a.nombre}"></td>
<td th:text="${a.pais}"></td>
<td th:text="${a.presidente}"></td>

<td>
<a th:href="@{'/asociacion/editar/' + ${a.id}}" class="btn btn-warning btn-sm">Editar</a>

<a th:href="@{'/asociacion/eliminar/' + ${a.id}}"
   onclick="return confirm('¿Eliminar asociación?')"
   class="btn btn-danger btn-sm">
   Eliminar
</a>
</td>
</tr>
</tbody>

</table>

<!-- PAGINACIÓN -->
<nav>
<ul class="pagination">
<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}">
<a class="page-link" th:href="@{/asociacion(page=${i})}" th:text="${i+1}"></a>
</li>
</ul>
</nav>

</div>
</div>

<!-- BUSCADOR SCRIPT -->
<script>
document.getElementById("buscador").addEventListener("keyup", function() {
    let filtro = this.value.toLowerCase();
    document.querySelectorAll("tbody tr").forEach(fila => {
        fila.style.display = fila.innerText.toLowerCase().includes(filtro) ? "" : "none";
    });
});
</script>

</body>
</html>
