<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Sistema Mundial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #f1f1f1;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(0,0,0,0.6);
        }

        .card-custom {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
        }

        .btn-custom {
            border-radius: 20px;
            padding: 8px 20px;
        }

        table {
            color: white;
        }

        th {
            color: #00d4ff;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4" th:fragment="navbar">
    <a class="navbar-brand" href="/">⚽ Mundial</a>

    <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm mx-1" href="/club">Club</a>
        <a class="btn btn-outline-light btn-sm mx-1" href="/jugador">Jugador</a>
        <a class="btn btn-outline-light btn-sm mx-1" href="/entrenador">Entrenador</a>
        <a class="btn btn-outline-light btn-sm mx-1" href="/asociacion">Asociación</a>
    </div>
</nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>
