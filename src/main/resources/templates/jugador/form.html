<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('Formulario Jugador')"></head>
<body>

<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
<div class="card card-custom p-4">

<h3>Formulario Jugador</h3>

<form th:action="@{/jugador/guardar}" th:object="${jugador}" method="post">

<input type="hidden" th:field="*{id}" />

<input class="form-control mb-2" placeholder="Nombre" th:field="*{nombre}">
<div class="text-danger" th:errors="*{nombre}"></div>

<input class="form-control mb-2" placeholder="Apellido" th:field="*{apellido}">
<div class="text-danger" th:errors="*{apellido}"></div>

<input class="form-control mb-2" type="number" placeholder="Número" th:field="*{numero}">
<input class="form-control mb-3" placeholder="Posición" th:field="*{posicion}">

<button class="btn btn-success">Guardar</button>
<a href="/jugador" class="btn btn-secondary">Volver</a>

</form>

</div>
</div>

</body>
</html>
