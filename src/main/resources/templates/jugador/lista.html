<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('Jugadores')"></head>
<body>

<div th:replace="layout :: navbar"></div>

<div class="container mt-4">
<div class="card card-custom p-4">

<h2>Jugadores</h2>

<!-- ALERTAS -->
<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<a href="/jugador/nuevo" class="btn btn-success mb-3">+ Nuevo</a>

<!-- BUSCADOR -->
<input type="text" id="buscador" class="form-control mb-3" placeholder="Buscar...">

<table class="table table-dark table-hover">
<thead>
<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Número</th>
<th>Posición</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
<tr th:each="j : ${lista}">
<td th:text="${j.nombre}"></td>
<td th:text="${j.apellido}"></td>
<td th:text="${j.numero}"></td>
<td th:text="${j.posicion}"></td>
<td>
<a th:href="@{'/jugador/editar/' + ${j.id}}" class="btn btn-warning btn-sm">Editar</a>
<a th:href="@{'/jugador/eliminar/' + ${j.id}}"
   onclick="return confirm('¿Eliminar jugador?')"
   class="btn btn-danger btn-sm">Eliminar</a>
</td>
</tr>
</tbody>
</table>

<!-- PAGINACIÓN -->
<nav>
<ul class="pagination">
<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}">
<a class="page-link" th:href="@{/jugador(page=${i})}" th:text="${i+1}"></a>
</li>
</ul>
</nav>

</div>
</div>

<script>
document.getElementById("buscador").addEventListener("keyup", function() {
let filtro = this.value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(fila => {
fila.style.display = fila.innerText.toLowerCase().includes(filtro) ? "" : "none";
});
});
</script>

</body>
</html>
